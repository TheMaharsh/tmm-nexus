version: "3.9"

services:
  postgres:
    image: postgres:16

    container_name: tmm_postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: tmm_nexus
      POSTGRES_USER: tmm
      POSTGRES_PASSWORD: tmm_secret

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmm -d tmm_nexus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data: