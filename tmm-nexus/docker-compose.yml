services:
  postgres:
    image: postgres:16-alpine
    container_name: tmm-nexus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tmm
      POSTGRES_PASSWORD: tmm_secret
      POSTGRES_DB: tmm_nexus
    ports:
      - "5432:5432"
    volumes:
      - tmm_nexus_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tmm -d tmm_nexus"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tmm_nexus_pgdata:
